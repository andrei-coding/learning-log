{% extends "learning_logs/base.html" %}

{% block header %}
    <h2>Login</h2>
{% endblock header %}

{% block content %}

    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <p>
            <label>Username:</label>
            <input type="text" name="username">
        </p>

        <p>
            <label>Password:</label>
            <input type="password" name="password">
        </p>

        <button type="submit">Entrar</button>
    </form>

{% endblock content %}
